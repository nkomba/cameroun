<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="chLogoTitle">
  <title id="chLogoTitle">Cameroun Histoire — seal of the open book beneath the star</title>
  <!-- Archival seal ring -->
  <circle cx="32" cy="32" r="29.5" fill="none" stroke="currentColor" stroke-width="2"/>
  <circle cx="32" cy="32" r="25.5" fill="none" stroke="currentColor" stroke-width="0.75" opacity="0.55"/>
  <!-- Star of the republic -->
  <path d="M32 12.5 L33.9 18.3 L40 18.3 L35.1 21.9 L37 27.7 L32 24.1 L27 27.7 L28.9 21.9 L24 18.3 L30.1 18.3 Z"
        fill="#a97e2f"/>
  <!-- Open book: two leaves -->
  <path d="M12.5 32.5 C19 29.5 25.5 29.5 31 32.5 L31 48 C25.5 45 19 45 12.5 48 Z"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
  <path d="M51.5 32.5 C45 29.5 38.5 29.5 33 32.5 L33 48 C38.5 45 45 45 51.5 48 Z"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
  <!-- Spine -->
  <line x1="32" y1="31" x2="32" y2="48.5" stroke="currentColor" stroke-width="1.4"/>
  <!-- Manuscript lines, left leaf -->
  <path d="M16.5 35.6 C20.5 34 24.5 34 27.5 35.4" fill="none" stroke="#9a3b26" stroke-width="1.1" stroke-linecap="round"/>
  <path d="M16.5 39.2 C20.5 37.6 24.5 37.6 27.5 39" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" opacity="0.6"/>
  <path d="M16.5 42.8 C20.5 41.2 24.5 41.2 27.5 42.6" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" opacity="0.6"/>
  <!-- Manuscript lines, right leaf -->
  <path d="M47.5 35.6 C43.5 34 39.5 34 36.5 35.4" fill="none" stroke="#9a3b26" stroke-width="1.1" stroke-linecap="round"/>
  <path d="M47.5 39.2 C43.5 37.6 39.5 37.6 36.5 39" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" opacity="0.6"/>
  <path d="M47.5 42.8 C43.5 41.2 39.5 41.2 36.5 42.6" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" opacity="0.6"/>
</svg>
